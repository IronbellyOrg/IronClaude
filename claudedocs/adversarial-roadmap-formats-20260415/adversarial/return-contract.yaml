  correction_3: "arXiv 2601.12014 (the strongest TOON counter-benchmark, confirmed verbatim) was omitted from the source. GCS penalty -38.9%/-30.9%/-42.2% vs JSON/XML/YAML on open-weight models up to 70B. Penalty narrows with scale; unverified for closed-weight frontier Claude; measures generation-only, not consumption. Hybrid-with-TOON is not production-ready without Claude-specific validation."
