  - {name: Prometheus_Metrics_Registry, wired: [auth_login_total, auth_login_duration_seconds, auth_token_refresh_total, auth_registration_total], phase: 5, xref: [5]}
  - {name: PasswordHasher_Strategy, wired: [bcrypt implementation (default], phase: 1, xref: [1, 4]}

