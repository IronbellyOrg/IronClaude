integration_points:
  - {name: AuthService_constructor_/_DI_container, wired: [TokenManager, PasswordHasher, UserRepo], phase: 1, xref: [2]}
  - {name: Auth_Router_(`/auth/*`), wired: [login, register, me, refresh, reset-request, reset-confirm handlers], phase: 1, xref: [2, 3]}
  - {name: Bearer_Token_Middleware, wired: [JwtService.verify(), protected routes (/auth/me, /profile)], phase: 2, xref: [3]}
