description: "Roadmap maps NFR-PRD-R.3 to 'Sync verification (make verify-sync)' in\
  \ success criteria table (Criterion 11) and Phase 4 ownership list, but spec defines\
  \ NFR-PRD-R.3 as 'Session start cost: ~50 tokens (name + description only)'. Session\
  \ start cost is never validated anywhere in the roadmap. Sync verification is a\
  \ migration step (spec Section 9, steps 9-10) with no corresponding NFR \u2014 the\
  \ roadmap elevated it to NFR status under the wrong ID."
